# Read the Docs configuration file for Sphinx projects
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

# Required
version: 2

# Set the OS and Python version
build:
  os: ubuntu-20.04
  tools:
    python: "3.7"  # Specify a Python version that is supported by Read the Docs

# Build documentation in the "docs/" directory with Sphinx
sphinx:
  configuration: docs/conf.py

# Specify the Furo theme as a requirement to be installed
python:
  version: 3.7  # Ensure the Python version here matches the one specified above
  install:
    - requirements: docs/requirements.txt
    # Or specify the packages to be installed directly
    - method: pip
      path: .
      extra_requirements:
        - furo